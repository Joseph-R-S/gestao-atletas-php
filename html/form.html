<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Atleta Form</title>
</head>
<body>
    <h1 class="titulo">Dados Cadastrais</h1>
    <form action="AtletaForm.php?method=save" method="post" >

        <div class="campo">
            <label for="id">ID:</label>
            <input type="number" id="id" name="id" readonly value="{id}">
        </div>
        
        <div class="campo">
            <label for="nome_completo">Nome:<span>*</span></label>
            <input type="text" id="nome_completo" name="nome_completo" placeholder="nome completo" 
                value="{nome_completo}">
        </div>

        <div class="campo">
            <label for="email">Email:<span>*</span></label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" value="{email}">
        </div>

        <div class="input-container">
            <label for="sexo">Sexo:<span>*</span></label>
            <select name="sexo">
                <option value="">Seleccione</option>
                <option value='M'>Masculino</option>
                <option value='F'>Femenino</option>
            </select>
        </div>

        <div class="campo">
            <label for="telefone">telefone:<span>*</span></label>
            <input type="tel" id="telefone" name="telefone" placeholder="65123456789" value="{telefone}">
        </div>

        <div class="campo">
            <label for="data_nascimento">data de nascimento:<span>*</span></label>
            <input type="date" id="data_nascimento" name="data_nascimento" value="{data_nascimento}">
        </div>

        <div class="campo">
            <input type="submit" value="SALVAR"/>
        </div>

    </form>
</body>
</html>
