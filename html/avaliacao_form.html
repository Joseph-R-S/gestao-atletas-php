<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Avaliação Form</title>
</head>

<body>
<div class="titulo">
    <h2>Nova Avaliação Física</h2>
</div>

<form method="POST" action="AvaliacaoForm.php">
    <input type="hidden" name="id" value="{id}">

    <div class="campo">
        <label>Atleta</label>
        <input type="text" name="atleta" value="{nome_completo}" required readonly>
    </div>

    <div class="campo">
        <label>Peso (kg) <span>*</span></label>
        <input type="number" step="0.01" name="peso" value="{peso}" required>
    </div>

    <div class="campo">
        <label>Altura (m) <span>*</span></label>
        <input type="number" step="0.01" name="altura" value="{altura}" required>
    </div>

    <div class="campo">
        <label>Meta Específica</label>
        <textarea name="meta_especifica" class="input-textarea">{meta_especifica}</textarea>
    </div>

    <div class="campo">
        <button type="submit" class="btn-salvar">Salvar Avaliação</button>
    </div>
</form>
</body>

</html>
